name: Check for New Hailo Releases

on:
  schedule:
    - cron: '0 8 * * 3'  # Every Wednesday at 08:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for newer HailoRT release
        id: check_driver
        run: |
          KNOWN_VERSION=$(cat .hailo-driver-version | tr -d '[:space:]')
          echo "Current tracked version: ${KNOWN_VERSION}"

          # Query GitHub releases for hailort-drivers
          # We check the hailo8 branch tags
          RELEASES_JSON=$(curl -sf "https://api.github.com/repos/hailo-ai/hailort-drivers/tags?per_page=100" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          LATEST=$(echo "$RELEASES_JSON" | python3 -c "
          import sys, json, re

          tags = json.load(sys.stdin)
          # Filter for version tags (v4.x.x pattern)
          versions = []
          for t in tags:
              m = re.match(r'^v?(\d+\.\d+\.\d+)$', t['name'])
              if m:
                  versions.append(m.group(1))

          if not versions:
              print('')
              sys.exit()

          # Sort semantically
          versions.sort(key=lambda v: [int(x) for x in v.split('.')])
          print(versions[-1])
          ")

          echo "Latest available version: ${LATEST}"

          if [ -n "$LATEST" ] && [ "$LATEST" != "$KNOWN_VERSION" ]; then
            # Compare versions numerically
            NEWER=$(python3 -c "
          known = [int(x) for x in '${KNOWN_VERSION}'.split('.')]
          latest = [int(x) for x in '${LATEST}'.split('.')]
          print('true' if latest > known else 'false')
          ")
            if [ "$NEWER" = "true" ]; then
              echo "Newer version found: ${LATEST}"
              echo "new_driver=true" >> "$GITHUB_OUTPUT"
              echo "new_version=${LATEST}" >> "$GITHUB_OUTPUT"
            else
              echo "No newer version"
              echo "new_driver=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No newer version"
            echo "new_driver=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if issue already exists
        if: steps.check_driver.outputs.new_driver == 'true'
        id: existing_issue
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.check_driver.outputs.new_version }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'hailo-driver-update',
              per_page: 100
            });
            const exists = issues.data.some(i => i.title.includes(newVersion));
            core.setOutput('exists', exists.toString());

      - name: Create issue for new Hailo driver
        if: steps.check_driver.outputs.new_driver == 'true' && steps.existing_issue.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.check_driver.outputs.new_version }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New HailoRT driver available: ${newVersion}`,
              body: `A newer HailoRT driver has been detected: **${newVersion}**\n\n` +
                `Source: https://github.com/hailo-ai/hailort-drivers/releases/tag/v${newVersion}\n\n` +
                `To build with this driver, manually trigger the **Build Hailo Sysext** workflow with:\n` +
                `- \`hailo_driver_version\`: \`${newVersion}\`\n\n` +
                `After verifying the build, update \`.hailo-driver-version\` to track this as the new default.`,
              labels: ['hailo-driver-update']
            });
